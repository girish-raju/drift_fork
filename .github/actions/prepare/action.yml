name: Prepare
description: Prepare CI environment to test a component of drift

inputs:
  flutter_version:
    description: Flutter version to use.
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: ${{ inputs.flutter_version }}

    # Setup sqlite3
    - name: Download sqlite3
      uses: actions/download-artifact@v4
      with:
        name: sqlite3
        path: drift/.dart_tool/sqlite3/
    - name: Use downloaded sqlite3
      shell: bash
      run: |
        chmod a+x drift/.dart_tool/sqlite3/latest/sqlite3
        echo $(realpath drift/.dart_tool/sqlite3/latest) >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$(realpath drift/.dart_tool/sqlite3/latest)" >> $GITHUB_ENV
    - name: Check sqlite3 version
      run: sqlite3 --version
      shell: bash

    # Setup Dart packages
    - uses: actions/cache@v4
      with:
        path: "${{ env.PUB_CACHE }}"
        key: dart-dependencies-${{ inputs.flutter_version }}-${{ hashFiles('**/pubspec.yaml') }}
        restore-keys: |
          dart-dependencies-${{ inputs.flutter_version }}-
          dart-dependencies-
    - name: Setup melos
      run: dart pub global activate melos && dart pub get
      shell: bash
