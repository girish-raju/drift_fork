name: drift_website
description: Documentation website for the drift project, built with jaspr.
publish_to: none

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  jaspr: ^0.21.5
  jaspr_content: ^0.4.2
  jaspr_router: ^0.7.3

  drift:
  drift_flutter:
  drift_postgres:
  drift_dev:
  package_config: ^2.2.0
  yaml: ^3.1.3
  watcher: ^1.1.3
  path: ^1.9.1
  json_annotation: ^4.9.0
  sqlite3: ^2.9.3
  sqlcipher_flutter_libs: ^0.6.8
  test: ^1.26.3
  rxdart: ^0.28.0
  jaspr_content_snippets: ^0.2.0
  glob: ^2.1.3
  markdown: ^7.3.0
  jaspr_docsy:
    hosted: https://pub-simonbinder-eu.fsn1.your-objectstorage.com
    version: 0.0.3
  universal_web: ^1.1.1
  http: ^1.5.0
  web: ^1.1.1
  riverpod: ^3.0.2
  jaspr_riverpod: ^0.4.0
  path_provider: ^2.1.4

dev_dependencies:
  build_runner: ^2.6.0
  build_web_compilers: ^4.2.4
  jaspr_builder: ^0.21.3
#  jaspr_lints: ^0.5.1
  lints: ^5.0.0
  json_serializable: ^6.11.1
  sass_builder: ^2.4.0

  jaspr_cli: ^0.21.5
  crypto: ^3.0.6

jaspr:
  mode: static

dependency_overrides:
  meta: ^1.17.0
  drift:
    path: ../drift
  drift_dev:
    path: ../drift_dev
  drift_flutter:
    path: ../drift_flutter
  drift_postgres:
    path: ../extras/drift_postgres
  sqlparser:
    path: ../sqlparser
  jaspr_riverpod:
    # Upstream PR: https://github.com/schultek/jaspr/pull/598
    # Also contains a fix for: https://github.com/schultek/jaspr/issues/600
    git:
      url: https://github.com/simolus3/jaspr.git
      ref: d51b12cb00a39f129a21caf997518eb0c9637ad9
      path: packages/jaspr_riverpod
