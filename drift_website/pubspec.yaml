name: drift_website
description: A documentation site built with Jaspr
version: 0.0.1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  jaspr: ^0.21.3
  jaspr_content: ^0.4.1
  jaspr_router: ^0.7.3

  drift:
  drift_flutter:
  drift_postgres:
  drift_dev:
  package_config: ^2.2.0
  yaml: ^3.1.3
  watcher: ^1.1.3
  path: ^1.9.1
  json_annotation: ^4.9.0
  sqlite3: ^2.9.1
  sqlcipher_flutter_libs: ^0.6.8
  test: ^1.26.3
  rxdart: ^0.28.0
  jaspr_content_snippets: ^0.1.1
  glob: ^2.1.3
  markdown: ^7.3.0

dev_dependencies:
  build_runner: ^2.6.0
  build_web_compilers: ^4.2.4
  jaspr_builder: ^0.21.3
#  jaspr_lints: ^0.5.1
  lints: ^5.0.0
  json_serializable: ^6.11.1
  sass_builder: ^2.3.1

jaspr:
  mode: static

dependency_overrides:
  meta: ^1.17.0
  drift:
    path: ../drift
  drift_dev:
    path: ../drift_dev
  drift_flutter:
    path: ../drift_flutter
  drift_postgres:
    path: ../extras/drift_postgres
  sqlparser:
    path: ../sqlparser
