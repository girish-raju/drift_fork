name: drift_website
description: A documentation site built with Jaspr
version: 0.0.1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  jaspr: ^0.21.3
  jaspr_content: ^0.4.1
  jaspr_router: ^0.7.3

  drift:
  package_config: ^2.2.0
  yaml: ^3.1.3
  watcher: ^1.1.3
  path: ^1.9.1

dev_dependencies:
  build_runner: ^2.6.0
  jaspr_web_compilers: ^4.2.3+1
  jaspr_builder: ^0.21.3
  jaspr_lints: ^0.5.1
  lints: ^5.0.0
  drift_dev:

jaspr:
  mode: static

dependency_overrides:
  drift:
    path: ../drift
  drift_dev:
    path: ../drift_dev
  drift_flutter:
    path: ../drift_flutter
  drift_postgres:
    path: ../extras/drift_postgres
  sqlparser:
    path: ../sqlparser
